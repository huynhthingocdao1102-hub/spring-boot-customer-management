<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xóa Khách Hàng - Hệ Thống Quản Lý Đáng Yêu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fdf4f5;
            color: #4c495d;
            padding-top: 60px;
        }
        .delete-card {
            background: #ffffff;
            border: none;
            border-radius: 24px; /* Bo góc múp míp */
            box-shadow: 0 10px 30px rgba(244, 114, 182, 0.08);
            padding: 35px;
        }
        .info-box {
            background-color: #fff1f2;
            border: 2px dashed #f472b6;
            border-radius: 18px;
            padding: 20px;
        }
        .info-label {
            font-weight: 700;
            color: #a855f7;
            font-size: 0.95rem;
        }
        .info-value {
            font-weight: 700;
            color: #3b2d54;
            font-size: 1.1rem;
        }
        /* Nút Xác nhận xóa hệ Bubbly kẹo dâu */
        .btn-delete {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px 20px;
            border-radius: 16px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-delete:hover {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(225, 29, 72, 0.3);
        }
        /* Nút Hủy bỏ nhẹ nhàng */
        .btn-cancel {
            background-color: #f3e8ff;
            border: none;
            color: #a855f7;
            font-weight: 700;
            padding: 12px 20px;
            border-radius: 16px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .btn-cancel:hover {
            background-color: #a855f7;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.2);
        }
        /* Link quay lại */
        .back-link {
            text-decoration: none;
            color: #f472b6;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .back-link:hover {
            color: #db2777;
            transform: translateX(-4px);
        }
        .icon-box-alert {
            width: 56px;
            height: 56px;
            background-color: #ffe4e6 !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="mb-4">
                <a href="/customers" class="back-link">
                    <i class="bi bi-chevron-left fw-bold"></i> Trở về danh sách nha
                </a>
            </div>

            <div class="delete-card">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3 icon-box-alert">
                        <i class="bi bi-exclamation-circle-fill fs-3" style="color: #f43f5e;"></i>
                    </div>
                    <h3 class="m-0" style="color: #3b2d54; font-weight: 700; letter-spacing: -0.5px;">Xóa Khách Hàng?</h3>
                    <p class="text-muted small mt-1">Hành động này sẽ thổi bay dữ liệu đó. Bạn có chắc chắn muốn xóa không nè?</p>
                </div>

                <form th:action="@{/customers/delete}" method="post">
                    <input type="hidden" name="id" th:value="${customer.id}">

                    <div class="info-box mb-4">
                        <div class="row mb-2 align-items-center">
                            <div class="col-4 info-label">Họ đệm:</div>
                            <div class="col-8 info-value" th:text="${customer.firstName}">Nguyễn</div>
                        </div>
                        <hr class="my-2" style="border-color: rgba(244, 114, 182, 0.3); border-style: dashed;">
                        <div class="row align-items-center">
                            <div class="col-4 info-label">Tên gọi:</div>
                            <div class="col-8 info-value" th:text="${customer.lastName}">An</div>
                        </div>
                    </div>

                    <div class="d-flex gap-3 mt-4">
                        <a href="/customers" class="btn btn-cancel flex-fill text-center justify-content-center m-0">
                            Hủy bỏ
                        </a>
                        <button type="submit" class="btn btn-delete flex-fill text-center justify-content-center m-0">
                            <i class="bi bi-trash3-fill"></i> Xác Nhận Xóa
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
