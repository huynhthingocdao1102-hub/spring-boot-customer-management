<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập Nhật Bạn Mới - Hệ Thống Quản Lý Đáng Yêu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fdf4f5;
            color: #4c495d;
            padding-top: 60px;
        }

        .form-card {
            background: #ffffff;
            border: none;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(244, 114, 182, 0.08);
            padding: 35px;
        }

        .form-label {
            font-weight: 700;
            color: #3b2d54;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-control {
            border-radius: 16px;
            padding: 12px 16px;
            border: 2px solid #fff1f2;
            transition: all 0.2s ease-in-out;
            background-color: #fff1f2;
            color: #4c495d;
            font-weight: 500;
        }

        .form-control:focus {
            background-color: #ffffff;
            border-color: #f472b6;
            box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.15);
            color: #4c495d;
        }

        /* Nút cập nhật hệ Bubbly kẹo dâu */
        .btn-submit {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            border: none;
            color: white;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 18px;
            width: 100%;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.3);
        }

        /* Link quay lại */
        .back-link {
            text-decoration: none;
            color: #f472b6;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .back-link:hover {
            color: #db2777;
            transform: translateX(-4px);
        }

        .icon-box-cute {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1) 0%, rgba(244, 114, 182, 0.1) 100%) !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="mb-4">
                <a href="/customers" class="back-link">
                    <i class="bi bi-chevron-left fw-bold"></i> Trở về danh sách
                </a>
            </div>

            <div class="form-card">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3 icon-box-cute">
                        <i class="bi bi-pencil-fill fs-4" style="color: #a855f7;"></i>
                    </div>
                    <h3 class="m-0" style="color: #3b2d54; font-weight: 700; letter-spacing: -0.5px;">Cập Nhật Thông Tin
                        ✨</h3>
                    <p class="text-muted small mt-1">F5 lại thông tin của người bạn thân yêu trên hệ thống</p>
                </div>

                <th:block th:if="${message}">
                    <div class="alert alert-success alert-dismissible fade show border-0 rounded-4 shadow-sm d-flex align-items-center mb-4"
                         role="alert" style="background-color: #fff1f2; color: #db2777;">
                        <i class="bi bi-stars me-2 fs-5"></i>
                        <span th:text="${message}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"
                                style="font-size: 0.75rem;"></button>
                    </div>
                </th:block>

                <form th:action="@{/customers/update}" method="post">

                    <input type="hidden" name="id" th:value="${customer != null ? customer.id : ''}">

                    <div class="mb-3">
                        <label for="firstName" class="form-label">Họ Và Đệm</label>
                        <input type="text" id="firstName" name="firstName"
                               th:value="${customer != null ? customer.firstName : ''}"
                               class="form-control" placeholder="Chỉnh sửa họ đệm..." required autocomplete="off"/>
                    </div>

                    <div class="mb-4">
                        <label for="lastName" class="form-label">Tên Gọi</label>
                        <input type="text" id="lastName" name="lastName"
                               th:value="${customer != null ? customer.lastName : ''}"
                               class="form-control" placeholder="Chỉnh sửa tên gọi..." required autocomplete="off"/>
                    </div>

                    <button type="submit" class="btn btn-submit">
                        <i class="bi bi-cloud-check-fill"></i> Lưu Thay Đổi
                    </button>

                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
